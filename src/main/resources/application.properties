server.port=8089
spring.application.name=APIGATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/




spring.cloud.gateway.routes[0].id=StudentService
spring.cloud.gateway.routes[0].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/student/**
#spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
#



spring.cloud.gateway.routes[1].id=StaffAdminService
spring.cloud.gateway.routes[1].uri=lb://STAFF-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/staff/admin/**
#spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=StaffService
spring.cloud.gateway.routes[2].uri=lb://STAFF-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/staff/**
